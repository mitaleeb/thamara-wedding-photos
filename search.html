<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thamara's Wedding · Find Your Photo Group</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyADsXRO7iHDSmu_QpbibQG4m2nxmrtADvQ",
  authDomain: "wedding-photo-groups.firebaseapp.com",
  databaseURL: "https://wedding-photo-groups-default-rtdb.firebaseio.com",
  projectId: "wedding-photo-groups",
  storageBucket: "wedding-photo-groups.firebasestorage.app",
  messagingSenderId: "863625703599",
  appId: "1:863625703599:web:5ffc6e47494560c5d3645a"
};
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTnNvNi5ptzZMZ2kByru9qvwHS7wYWs5oHDFxi3OiTahz5hAMuzMPzIxNPlMx3GnVA03C3SlQDL_Ntt/pub?output=csv";
</script>

<style>
:root {
  --green: #394735;
  --green-mid: #4a5e45;
  --green-light: #6b8565;
  --green-pale: #f2f7f2;
  --green-border: rgba(57,71,53,0.2);
  --surface: #f7faf7;
  --white: #ffffff;
  --deep: #1a2218;
  --muted: #607a5c;
  --border: rgba(57,71,53,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Jost', sans-serif;
  background: var(--surface);
  min-height: 100vh;
  color: var(--deep);
  -webkit-font-smoothing: antialiased;
}

.header {
  background: var(--green);
  padding: 1.4rem 1.25rem 1.2rem;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.12);
}
.header-eyebrow {
  font-size: 9px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  font-weight: 300;
  margin-bottom: 4px;
}
.header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.75rem;
  color: #ffffff;
  font-weight: 500;
  letter-spacing: 0.5px;
}
.header-sub {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  font-weight: 300;
  margin-top: 3px;
}

.live-bar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0.6rem 1.25rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.live-left {
  display: flex;
  align-items: center;
  gap: 6px;
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #22c55e;
  animation: blink 1.8s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.live-text {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #22c55e;
  font-weight: 500;
}
.now-shooting {
  font-size: 11px;
  color: var(--muted);
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
}
.now-shooting strong {
  color: var(--green);
  font-weight: 500;
  font-style: normal;
}

.main {
  max-width: 540px;
  margin: 0 auto;
  padding: 1.5rem 1.25rem 3rem;
}

.intro {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.05rem;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 1.25rem;
  text-align: center;
}

.search-wrap {
  position: relative;
  margin-bottom: 1rem;
}
.search-icon {
  position: absolute;
  left: 0.9rem;
  top: 50%;
  transform: translateY(-50%);
  width: 15px; height: 15px;
  opacity: 0.35;
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 0.85rem 1rem 0.85rem 2.6rem;
  border: 1px solid var(--green-border);
  border-radius: 4px;
  font-family: 'Jost', sans-serif;
  font-size: 15px;
  background: var(--white);
  color: var(--deep);
  outline: none;
  transition: border-color 0.2s;
}
.search-input::placeholder { color: #b0c4ae; }
.search-input:focus { border-color: var(--green); }

.people-list-label {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
}
.people-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 0.75rem;
}
.person-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.65rem 0.9rem;
  background: var(--white);
  border: 1px solid var(--green-border);
  border-radius: 4px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.person-row:hover { border-color: var(--green); }
.person-row:active { transform: scale(0.99); }
.person-row-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  font-style: italic;
  color: var(--deep);
}
.person-row-group { font-size: 11px; color: var(--muted); margin-top: 1px; }
.person-row-arrow { font-size: 12px; color: var(--green); flex-shrink: 0; }

.result-card {
  background: var(--white);
  border: 1px solid var(--green-border);
  border-radius: 4px;
  overflow: hidden;
  display: none;
  margin-bottom: 0.75rem;
}
.result-card.visible { display: block; }

.result-top {
  background: var(--green);
  padding: 1.1rem 1.25rem 1rem;
}
.result-greeting {
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  margin-bottom: 3px;
}
.result-person-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  color: #ffffff;
  font-weight: 500;
  font-style: italic;
}

.result-body { padding: 1rem 1.1rem; }
.result-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.result-group-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem;
  color: var(--green);
  font-style: italic;
  line-height: 1.3;
}
.result-group-num { font-size: 11px; color: var(--muted); margin-top: 2px; margin-bottom: 10px; }

.result-status {
  padding: 8px 10px;
  border-radius: 3px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.3px;
  line-height: 1.4;
}
.result-status.now { background: #fef2f2; color: #991b1b; border: 0.5px solid #fca5a5; }
.result-status.next { background: #fffbeb; color: #92400e; border: 0.5px solid #fcd34d; }
.result-status.done { background: #f0fdf4; color: #166534; border: 0.5px solid #86efac; }
.result-status.upcoming { background: var(--green-pale); color: #394735; border: 0.5px solid var(--green-border); }

.back-btn {
  width: 100%;
  margin-top: 10px;
  padding: 0.65rem;
  background: none;
  border: 1px solid var(--green-border);
  border-radius: 4px;
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.back-btn:hover { border-color: var(--green); color: var(--green); }

.no-result {
  text-align: center;
  padding: 1.25rem;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
  display: none;
}

.loading-state {
  text-align: center;
  padding: 2rem 0;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}

#lookup-people-list { display: none; }

.ornament {
  text-align: center;
  color: var(--green);
  font-size: 14px;
  opacity: 0.25;
  padding: 2rem 0 0;
  letter-spacing: 8px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">✦ d & t ✦</div>
  <div class="header-title">Find Your Photo Group</div>
  <div class="header-sub">Live · Family Photos</div>
</div>

<div class="live-bar">
  <div class="live-left">
    <span class="live-dot"></span>
    <span class="live-text">Live</span>
  </div>
  <div class="now-shooting">Now: <strong id="now-shooting-name">Loading...</strong></div>
</div>

<div class="main">
  <p class="intro">Type your name to find your group and see when to head to the hall.</p>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="6.5" cy="6.5" r="5" stroke="#394735" stroke-width="1.5"/>
      <path d="M10.5 10.5L14 14" stroke="#394735" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input
      class="search-input"
      type="text"
      id="lookup-input"
      placeholder="e.g. Priya Sharma"
      autocomplete="off"
      oninput="doLookup()"
    />
  </div>

  <div id="lookup-people-list"></div>

  <div class="result-card" id="lookup-result">
    <div class="result-top">
      <div class="result-greeting">Your photo group</div>
      <div class="result-person-name" id="result-person-name"></div>
    </div>
    <div class="result-body">
      <div class="result-label">Group</div>
      <div class="result-group-name" id="lookup-group-name"></div>
      <div class="result-group-num" id="lookup-group-num"></div>
      <div class="result-status" id="lookup-status"></div>
      <button class="back-btn" onclick="clearSearch()">← Search again</button>
    </div>
  </div>

  <div class="no-result" id="lookup-no-result">
    No match found. Try a different spelling or check with the coordinator.
  </div>

  <div class="ornament">✦ ✦ ✦</div>
</div>

<script>
let GROUPS = [];
let activeGroupIndex = 0;
let completedGroups = new Set();
let firebaseReady = false;
let db = null;

async function loadGroups() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const rows = text.trim().split('\n').slice(1);
    const raw = {};
    const order = [];
    rows.forEach(row => {
      const cols = row.match(/(".*?"|[^,]+)(?=,|$)/g) || row.split(',');
      const clean = s => (s||'').trim().replace(/^"|"$/g,'');
      const first = clean(cols[0]);
      const last = clean(cols[1]);
      const group = clean(cols[2]);
      if (!group || group.toLowerCase() === 'sort' || group.toLowerCase() === 'photo group name') return;
      const name = (first + ' ' + last).trim();
      if (!raw[group]) { raw[group] = []; order.push(group); }
      if (name && name !== ' ') raw[group].push(name);
    });
    GROUPS = order.map(g => ({ name: g, members: raw[g] }));
  } catch(e) {
    console.error('Failed to load guest list:', e);
  }
}

function updateNowShooting() {
  const el = document.getElementById('now-shooting-name');
  if (completedGroups.size === GROUPS.length && GROUPS.length > 0) {
    el.textContent = 'All done!';
    return;
  }
  if (GROUPS[activeGroupIndex]) {
    el.textContent = GROUPS[activeGroupIndex].name;
  }
}

function renderAll() {
  updateNowShooting();
  doLookup();
}

loadGroups().then(() => {
  updateNowShooting();

  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    const ref = db.ref('state');

    ref.on('value', snap => {
      const val = snap.val();
      if (val) {
        activeGroupIndex = val.activeGroupIndex || 0;
        completedGroups = new Set(val.completedGroups || []);
        renderAll();
      }
    });

    firebaseReady = true;
  } catch(e) {
    console.error('Firebase error:', e);
    renderAll();
  }
});

function doLookup() {
  const query = document.getElementById('lookup-input').value.trim().toLowerCase();
  const resultEl = document.getElementById('lookup-result');
  const noResultEl = document.getElementById('lookup-no-result');
  const peopleListEl = document.getElementById('lookup-people-list');

  if (!query || query.length < 2) {
    resultEl.classList.remove('visible');
    noResultEl.style.display = 'none';
    peopleListEl.style.display = 'none';
    return;
  }

  let people = [];
  for (let i = 0; i < GROUPS.length; i++) {
    for (const m of GROUPS[i].members) {
      if (m.toLowerCase().includes(query)) {
        people.push({ name: m, group: GROUPS[i], idx: i });
      }
    }
  }

  const byName = {};
  for (const p of people) {
    if (!byName[p.name]) byName[p.name] = { name: p.name, entries: [] };
    byName[p.name].entries.push({ group: p.group, idx: p.idx });
  }
  const uniquePeople = Object.values(byName);

  if (uniquePeople.length === 0) {
    resultEl.classList.remove('visible');
    peopleListEl.style.display = 'none';
    noResultEl.style.display = 'block';
    return;
  }

  noResultEl.style.display = 'none';

  if (uniquePeople.length >= 1) {
    resultEl.classList.remove('visible');
    peopleListEl.style.display = 'block';
    peopleListEl.innerHTML = `
      <div class="people-list-label">${uniquePeople.length === 1 ? 'Is this you?' : 'Multiple people found — tap your name'}</div>
      <div class="people-list">
        ${uniquePeople.map(p => `
          <div class="person-row" onclick="selectPerson('${p.name.replace(/'/g, "\\'")}')">
            <div>
              <div class="person-row-name">${p.name}</div>
              <div class="person-row-group">${p.entries.map(e => e.group.name).join(' · ')}</div>
            </div>
            <div class="person-row-arrow">→</div>
          </div>
        `).join('')}
      </div>
    `;
    return;
  }

  peopleListEl.style.display = 'none';
  showPersonResult(uniquePeople[0]);
}

function selectPerson(name) {
  const entries = [];
  for (let i = 0; i < GROUPS.length; i++) {
    for (const m of GROUPS[i].members) {
      if (m === name) entries.push({ group: GROUPS[i], idx: i });
    }
  }
  document.getElementById('lookup-people-list').style.display = 'none';
  showPersonResult({ name, entries });
}

function showPersonResult(person) {
  const resultEl = document.getElementById('lookup-result');
  const peopleListEl = document.getElementById('lookup-people-list');
  const entries = person.entries;

  document.getElementById('result-person-name').textContent = person.name;

  if (entries.length > 1) {
    document.getElementById('lookup-group-name').textContent = entries.map(e => `#${e.idx + 1} ${e.group.name}`).join(' · ');
    document.getElementById('lookup-group-num').textContent = `${person.name} is in ${entries.length} groups`;
  } else {
    document.getElementById('lookup-group-name').textContent = entries[0].group.name;
    document.getElementById('lookup-group-num').textContent = `Group #${entries[0].idx + 1} of ${GROUPS.length}`;
  }

  const remaining = GROUPS.map((_, i) => i).filter(i => !completedGroups.has(i));
  const earliestUpcoming = entries.filter(e => !completedGroups.has(e.idx)).sort((a, b) => a.idx - b.idx)[0];
  const activeEntry = earliestUpcoming || entries[entries.length - 1];
  const posInQueue = remaining.indexOf(activeEntry ? activeEntry.idx : -1);

  let statusClass, statusMsg;
  if (entries.some(e => e.idx === activeGroupIndex && !completedGroups.has(e.idx))) {
    statusClass = 'now';
    statusMsg = 'Your group is being photographed right now — please come to the stage!';
  } else if (entries.some(e => remaining[0] === e.idx)) {
    statusClass = 'next';
    statusMsg = 'Your group is up next — please be by the stage!';
  } else if (entries.every(e => completedGroups.has(e.idx))) {
    statusClass = 'done';
    statusMsg = 'All your groups have been photographed. Enjoy the celebration!';
  } else {
    statusClass = 'upcoming';
    if (posInQueue <= 2) {
      statusMsg = 'Please stay in the hall! We\'ll get to your group soon!';
    } else if (posInQueue <= 10) {
      statusMsg = 'Please be in the wedding hall, your group will be called up soon!';
    } else if (posInQueue <= 15) {
      statusMsg = 'Get ready to head over to the wedding hall, your group is coming up!';
    } else {
      statusMsg = 'Enjoy the food — you have some time until your group is up!';
    }
  }

  const statusEl = document.getElementById('lookup-status');
  statusEl.className = 'result-status ' + statusClass;
  statusEl.textContent = statusMsg;

  peopleListEl.style.display = 'none';
  resultEl.classList.add('visible');
}

function clearSearch() {
  document.getElementById('lookup-input').value = '';
  document.getElementById('lookup-result').classList.remove('visible');
  document.getElementById('lookup-people-list').style.display = 'none';
  document.getElementById('lookup-no-result').style.display = 'none';
  document.getElementById('lookup-input').focus();
}
</script>
</body>
</html>
